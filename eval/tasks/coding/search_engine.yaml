id: coding-search-engine
task_type: coding
description: >
  Explain the SearchEngine class in YAMS. What is the class declaration,
  what search types does it support, and how does hybrid search combine
  results from different backends?
plan: |
  Tests First
  1. Identify the SearchEngine declaration and constructor surface.
  - Cite the header that defines the class and key public methods.
  2. Verify which search modes/backends participate in the engine.
  - Cover keyword, semantic/vector, graph, and hybrid/fusion concepts if present.
  3. Explain how hybrid search fuses results.
  - Ground the explanation in the concrete fusion or ranking path, not just high-level guesses.

  Acceptance Gates
  - Must mention SearchEngine by name.
  - Must explain at least two backend families used in hybrid search.
  - Must describe how combined ranking or fusion works without hallucinating unsupported components.
ground_truth:
  files:
    - src/search/search_engine.cpp
    - include/yams/search/search_engine.h
    - src/search/search_engine_builder.cpp
  symbols:
    - SearchEngine
    - hybrid
    - fusion
    - FTS5
    - vector
  patterns:
    - SearchEngine
    - re:hybrid|fusion
    - re:FTS5|full.text
    - re:semantic|vector|embedding
    - re:knowledge.graph|KG
evaluation:
  contains_patterns:
    - SearchEngine
    - re:hybrid|fusion
    - re:semantic|vector|embedding
  pass_metric: contains_pattern
  pass_threshold: 0.8
  length:
    min_tokens: 50
    max_tokens: 1000
tags:
  - search
  - hybrid
  - architecture
