id: qa-mcp-protocol
task_type: qa
description: >
  How does YAMS expose its functionality over MCP (Model Context Protocol)?
  How is the server started, what transport does it use, and how does
  a client communicate with it?
plan: |
  Tests First
  1. Identify how the MCP server is started.
  - Include the CLI or daemon entrypoint responsible for startup.
  2. Confirm the transport and wire protocol.
  - Explain stdio/NDJSON/JSON-RPC details only if grounded in the code.
  3. Summarize how clients invoke tools.
  - Mention tool registration and request handling at a high level.

  Acceptance Gates
  - Must mention MCP or Model Context Protocol explicitly.
  - Must mention the transport used by the server.
  - Must explain how a client issues tool calls or requests.
ground_truth:
  files:
    - src/mcp/stdio_transport.cpp
    - src/mcp/mcp_server.cpp
    - src/cli/commands/serve_command.cpp
  symbols:
    - MCP
    - NDJSON
    - JSON-RPC
    - yams serve
    - tools/call
  patterns:
    - re:MCP|Model Context Protocol
    - re:stdio|NDJSON|JSON.RPC
    - re:yams serve
    - re:tool
evaluation:
  contains_patterns:
    - re:MCP|Model Context Protocol
    - re:stdio|JSON.RPC|NDJSON
    - re:tool|serve
  pass_metric: contains_pattern
  pass_threshold: 0.8
  length:
    min_tokens: 30
    max_tokens: 600
tags:
  - mcp
  - protocol
  - concepts
